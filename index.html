<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Défi 2 - Constituants PV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: transparent !important;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            height: 100%;
            background: transparent;
            position: relative;
            display: flex;
            flex-direction: row;
        }
        
        /* Zone principale gauche - 70% */
        .main-area {
            position: relative;
            width: 70%;
            height: 100%;
            background: transparent;
        }
        
        /* Hotspots cliquables */
        .hotspot {
            position: absolute;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .hotspot::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: rgba(243, 156, 18, 0.9);
            border: 3px solid white;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.8);
        }
        
        .hotspot:hover::before {
            background: rgba(230, 126, 34, 0.95);
            transform: translate(-50%, -50%) scale(1.15);
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }
        
        .hotspot.discovered::before {
            background: rgba(39, 174, 96, 0.9);
            animation: none;
        }
        
        .hotspot.discovered::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 2;
        }
        
        /* Surbrillance des éléments */
        .highlight {
            position: absolute;
            border: 4px solid #F39C12;
            background: rgba(243, 156, 18, 0.25);
            border-radius: 15px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
            pointer-events: none;
            z-index: 50;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.6);
        }
        
        .highlight.revealed {
            opacity: 1;
            transform: scale(1);
        }
        
        /* Positions des hotspots */
        #hotspot-panneau { top: 10%; left: 8%; }
        #hotspot-onduleur { top: 38%; left: 32%; }
        #hotspot-batterie { top: 28%; left: 48%; }
        #hotspot-regulateur { top: 58%; left: 62%; }
        #hotspot-compteur { top: 58%; left: 48%; }
        #hotspot-reseau { top: 12%; right: 5%; }
        
        /* Positions des highlights */
        #highlight-panneau { top: 6%; left: 2%; width: 28%; height: 22%; }
        #highlight-onduleur { top: 33%; left: 27%; width: 14%; height: 15%; }
        #highlight-batterie { top: 24%; left: 44%; width: 12%; height: 12%; }
        #highlight-regulateur { top: 53%; left: 58%; width: 14%; height: 15%; }
        #highlight-compteur { top: 53%; left: 44%; width: 12%; height: 15%; }
        #highlight-reseau { top: 5%; right: 5%; width: 16%; height: 50%; }
        
        /* Panneau de sélection à droite */
        .selection-panel {
            position: absolute;
            top: 50%;
            right: 2%;
            transform: translateY(-50%);
            width: 26%;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 15px;
            border-radius: 20px;
            border: 3px solid #2C3E50;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 200;
            max-height: 95%;
            overflow-y: auto;
        }
        
        .selection-title {
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: #2C3E50;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 3px solid #F39C12;
        }
        
        .constituant-btn {
            background: linear-gradient(135deg, #F39C12, #E67E22);
            color: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }
        
        .constituant-btn:hover:not(.discovered) {
            transform: translateX(5px);
        }
        
        .constituant-btn.discovered {
            background: linear-gradient(135deg, #27AE60, #229954);
            cursor: default;
            opacity: 0.8;
        }
        
        .constituant-btn .icon { font-size: 1.4rem; min-width: 32px; text-align: center; }
        .constituant-btn .name { flex: 1; font-weight: bold; font-size: 0.85rem; }
        .constituant-btn .check { font-size: 1.2rem; display: none; }
        .constituant-btn.discovered .check { display: block; }
        
        /* Progression */
        .progress {
            margin-top: 15px;
            padding: 10px;
            background: #E8F5E9;
            border-radius: 10px;
            border: 2px solid #4CAF50;
        }
        
        .progress h3 {
            color: #2C3E50;
            margin-bottom: 5px;
            font-size: 0.85rem;
            text-align: center;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #E0E0E0;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.75rem;
        }
        
        /* Bouton suivant */
        .next-btn {
            display: none;
            margin-top: 12px;
            padding: 10px;
            width: 100%;
            background: linear-gradient(135deg, #F39C12, #E67E22);
            color: white;
            border: 2px solid white;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #D68910;
        }
        
        .next-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 0 #D68910; }
        .next-btn.show { display: block; }
        
        /* Panneau d'explication */
        .explanation-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%;
            max-width: 500px;
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            transition: transform 0.3s ease;
            border: 4px solid #F39C12;
        }
        
        .explanation-panel.active { transform: translate(-50%, -50%) scale(1); }
        
        .explanation-panel h2 {
            color: #2C3E50;
            margin-bottom: 10px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .explanation-panel .icon { font-size: 2rem; }
        .explanation-panel p { color: #555; line-height: 1.6; margin-bottom: 10px; font-size: 0.9rem; }
        
        .explanation-panel .role {
            background: #FFF3E0;
            padding: 12px;
            border-radius: 12px;
            border-left: 4px solid #F39C12;
            margin: 12px 0;
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .close-explanation {
            background: linear-gradient(135deg, #F39C12, #E67E22);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        .close-explanation:hover { transform: translateY(-2px); box-shadow: 0 5px 12px rgba(0, 0, 0, 0.2); }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            display: none;
        }
        
        .overlay.active { display: block; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .selection-panel { width: 32%; padding: 12px; }
            .constituant-btn .name { font-size: 0.7rem; }
            .hotspot { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Zone principale avec hotspots -->
        <div class="main-area">
            <div class="highlight" id="highlight-panneau"></div>
            <div class="highlight" id="highlight-onduleur"></div>
            <div class="highlight" id="highlight-batterie"></div>
            <div class="highlight" id="highlight-regulateur"></div>
            <div class="highlight" id="highlight-compteur"></div>
            <div class="highlight" id="highlight-reseau"></div>
            
            <div class="hotspot" id="hotspot-panneau" data-id="panneau"></div>
            <div class="hotspot" id="hotspot-onduleur" data-id="onduleur"></div>
            <div class="hotspot" id="hotspot-batterie" data-id="batterie"></div>
            <div class="hotspot" id="hotspot-regulateur" data-id="regulateur"></div>
            <div class="hotspot" id="hotspot-compteur" data-id="compteur"></div>
            <div class="hotspot" id="hotspot-reseau" data-id="reseau"></div>
        </div>
        
        <!-- Panneau de sélection -->
        <div class="selection-panel">
            <div class="selection-title">🎯 Clique pour découvrir</div>
            
            <div class="constituant-btn" data-id="panneau">
                <div class="icon">🔵</div>
                <div class="name">PANNEAU</div>
                <div class="check">✓</div>
            </div>
            <div class="constituant-btn" data-id="onduleur">
                <div class="icon">🔄</div>
                <div class="name">ONDULEUR</div>
                <div class="check">✓</div>
            </div>
            <div class="constituant-btn" data-id="batterie">
                <div class="icon">🔋</div>
                <div class="name">BATTERIE</div>
                <div class="check">✓</div>
            </div>
            <div class="constituant-btn" data-id="regulateur">
                <div class="icon">⚖️</div>
                <div class="name">RÉGULATEUR</div>
                <div class="check">✓</div>
            </div>
            <div class="constituant-btn" data-id="compteur">
                <div class="icon">📊</div>
                <div class="name">COMPTEUR</div>
                <div class="check">✓</div>
            </div>
            <div class="constituant-btn" data-id="reseau">
                <div class="icon">⚡</div>
                <div class="name">RÉSEAU</div>
                <div class="check">✓</div>
            </div>
            
            <div class="progress">
                <h3><span id="count">0</span>/6 découverts</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
                </div>
            </div>
            
            <button class="next-btn" id="nextBtn">✨ J'ai tout découvert ! ✨</button>
        </div>
    </div>
    
    <div class="overlay" id="overlay"></div>
    
    <div class="explanation-panel" id="explanationPanel">
        <h2 id="panelTitle"></h2>
        <p id="panelDescription"></p>
        <div class="role" id="panelRole"></div>
        <button class="close-explanation" id="closeExplanationBtn">✅ J'ai compris !</button>
    </div>
    
    <script>
        const constituants = {
            panneau: {
                icon: "🔵",
                title: "PANNEAU SOLAIRE",
                description: "Le panneau solaire est le cœur de l'installation ! Il est composé de cellules photovoltaïques en silicium qui captent les rayons du soleil.",
                role: "🔑 RÔLE : Capte les rayons du soleil et produit du courant CONTINU (DC). Chaque photon de lumière libère des électrons !"
            },
            onduleur: {
                icon: "🔄",
                title: "ONDULEUR",
                description: "L'onduleur est le \"traducteur\" de l'installation. Nos appareils fonctionnent en courant alternatif (AC), mais les panneaux produisent du courant continu (DC).",
                role: "🔑 RÔLE : Transforme le courant CONTINU (DC) en courant ALTERNATIF (AC) utilisable dans les maisons."
            },
            batterie: {
                icon: "🔋",
                title: "BATTERIE",
                description: "La batterie est le garde-manger de l'installation ! Elle stocke l'énergie produite pendant la journée.",
                role: "🔑 RÔLE : Stocke l'électricité pour une utilisation ultérieure (nuit ou jours nuageux)."
            },
            regulateur: {
                icon: "⚖️",
                title: "RÉGULATEUR",
                description: "Le régulateur est le protecteur des batteries. Il surveille en permanence leur état de charge.",
                role: "🔑 RÔLE : Protège les batteries contre la surcharge ou la décharge complète. Prolonge leur durée de vie !"
            },
            compteur: {
                icon: "📊",
                title: "COMPTEUR",
                description: "Le compteur est le tableau de bord de l'installation. Il enregistre toutes les informations.",
                role: "🔑 RÔLE : Mesure l'énergie produite et consommée. Permet de suivre la performance."
            },
            reseau: {
                icon: "⚡",
                title: "RÉSEAU ÉLECTRIQUE",
                description: "Le réseau électrique est le système de distribution qui relie toutes les habitations.",
                role: "🔑 RÔLE : Distribue l'électricité vers les habitations. Peut recevoir le surplus d'énergie."
            }
        };
        
        let discovered = new Set();
        
        function revealElement(id) {
            if (discovered.has(id)) return;
            
            const highlight = document.getElementById('highlight-' + id);
            if (highlight) highlight.classList.add('revealed');
            
            const hotspot = document.getElementById('hotspot-' + id);
            if (hotspot) hotspot.classList.add('discovered');
            
            const btn = document.querySelector(`.constituant-btn[data-id="${id}"]`);
            if (btn) btn.classList.add('discovered');
            
            discovered.add(id);
            updateProgress();
        }
        
        function showExplanation(id) {
            const info = constituants[id];
            document.getElementById('panelTitle').innerHTML = `<span class="icon">${info.icon}</span> ${info.title}`;
            document.getElementById('panelDescription').textContent = info.description;
            document.getElementById('panelRole').textContent = info.role;
            document.getElementById('explanationPanel').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }
        
        function closeExplanation() {
            document.getElementById('explanationPanel').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }
        
        function updateProgress() {
            const count = discovered.size;
            const percentage = Math.round((count / 6) * 100);
            document.getElementById('count').textContent = count;
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressFill').textContent = percentage + '%';
            
            if (count === 6) {
                document.getElementById('nextBtn').classList.add('show');
            }
        }
        
        // Gestionnaires d'événements
        document.querySelectorAll('.constituant-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = this.dataset.id;
                if (!discovered.has(id)) {
                    revealElement(id);
                    showExplanation(id);
                }
            });
        });
        
        document.querySelectorAll('.hotspot').forEach(hotspot => {
            hotspot.addEventListener('click', function() {
                const id = this.dataset.id;
                if (!discovered.has(id)) {
                    revealElement(id);
                    showExplanation(id);
                }
            });
        });
        
        document.getElementById('closeExplanationBtn').addEventListener('click', closeExplanation);
        document.getElementById('overlay').addEventListener('click', closeExplanation);
        
        document.getElementById('nextBtn').addEventListener('click', function() {
            if (discovered.size === 6) {
                alert('Passage à l\'Activité 2 : Associer constituant et fonction');
            }
        });
    </script>
</body>
</html>
